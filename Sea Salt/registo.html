<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | SeaSalt Conscious Swimwear</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-visual">
            <div class="auth-overlay"></div>
            <div class="auth-quote">
                <p>"Proteger o oceano não é uma escolha, é a nossa herança."</p>
                <span>— SeaSalt Manifesto</span>
            </div>
        </div>

        <div class="auth-form-section">
            <a href="index.html" class="back-home">← Voltar à Loja</a>
            
            <div class="auth-box">
                <div class="logo">SEASALT<span>~</span></div>
                <h2>Cria a tua conta.</h2>
                <p>Junta-te à nossa comunidade e recebe acesso exclusivo a novas coleções.</p>
            </div>
        
                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" placeholder="Como te chamas?" required>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="teu@email.com" required>
                    </div>
                    <div class="input-group">
                        <label>Palavra-passe</label>
                        <input type="password" placeholder="Mínimo 8 caracteres" required>
                    </div>
                    <button type="submit" class="auth-submit">Criar Conta</button>
                </form>

<script src="auth.js"></script>

                <p class="auth-footer">
                    Já tens uma conta? <a href="login.html">Fazer Login</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
