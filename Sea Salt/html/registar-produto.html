<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Sea Salt - Registar Produto</title>
    <link rel="stylesheet" href="../css/style3.css">
</head>
<body style="padding: 100px 5%; max-width: 600px; margin: auto;">

    <h2>Adicionar Novo Produto</h2>
    
    <form id="form-produto" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
        <input type="text" id="nome" placeholder="Nome do Produto (Ex: Biquíni Kaia)" required style="padding: 10px;">
        
        <input type="number" id="preco" placeholder="Preço (Ex: 45.00)" step="0.01" required style="padding: 10px;">
        
        <textarea id="descricao" placeholder="Descrição do produto..." rows="4" required style="padding: 10px;"></textarea>
        
        <label>Imagem do Produto:</label>
        <input type="file" id="imagem" accept="image/png, image/jpeg, image/webp" required>
        
        <button type="submit" id="btn-submit" class="btn-primary" style="margin-top: 10px;">Registar Produto</button>
    </form>

    <p id="mensagem-status" style="margin-top: 20px; font-weight: bold;"></p>

    <!-- É crucial carregar o script como type="module" -->
    <script type="module" src="../js/registar-produto.js"></script>
</body>
</html>
