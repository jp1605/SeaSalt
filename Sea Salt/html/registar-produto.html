<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registar Produto | SeaSalt Admin</title>
    <link rel="stylesheet" href="../css/registar-produto.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="admin-page">

    <nav class="navbar">
        <a href="../index.html" class="logo">
            <img src="../assets/frase-logo-rmvbg.png" alt="SeaSalt Logo">
        </a>
        <a href="colecao.html" style="text-decoration: none; color: var(--text); font-size: 0.85rem; font-weight: 600;">← VOLTAR À LOJA</a>
    </nav>

    <main class="admin-container">
        <div class="admin-card">
            <div class="admin-header">
                <h2>Adicionar Produto</h2>
                <p>Preenche os detalhes para lançar uma nova peça na coleção.</p>
            </div>
            
            <form id="form-produto" class="admin-form">
                
                <div class="input-group-full">
                    <label for="nome">Nome do Produto</label>
                    <input type="text" id="nome" class="admin-input" placeholder="Ex: Biquíni Kaia" required>
                </div>

                <div class="admin-form-row">
                    <div class="input-group-half">
                        <label for="preco">Preço (€)</label>
                        <input type="number" id="preco" class="admin-input" placeholder="45.00" step="0.01" required>
                    </div>
                    <div class="input-group-half">
                        <label for="tamanho">Tamanho</label>
                        <select id="tamanho" class="admin-input" required>
                            <option value="" disabled selected>Selecionar...</option>
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                        </select>
                    </div>
                </div>

                <div class="admin-form-row">
                    <div class="input-group-half">
                        <label for="cor">Cor</label>
                        <input type="text" id="cor" class="admin-input" placeholder="Ex: Rosa" required>
                    </div>
                    <div class="input-group-half">
                        <label for="categoria">Categoria</label>
                        <input type="text" id="categoria" class="admin-input" placeholder="Ex: Biquíni" required>
                    </div>
                </div>

                <div class="input-group-full">
                    <label for="descricao">Descrição Detalhada</label>
                    <textarea id="descricao" class="admin-input" placeholder="Descreve os materiais, o corte e o conforto da peça..." required></textarea>
                </div>

                <div class="input-group-full">
                    <label>Fotografia</label>
                    <div class="file-upload-wrapper">
                        <input type="file" id="imagem" accept="image/png, image/jpeg, image/webp" required>
                        <span class="file-hint">Formatos aceites: JPG, PNG, WEBP.</span>
                    </div>
                </div>
                
                <button type="submit" id="btn-submit" class="btn-admin">Registar Produto</button>
                <p id="mensagem-status" class="status-msg"></p>
            </form>
        </div>
    </main>

    <script type="module" src="../js/registar-produto.js"></script>
</body>
</html>
