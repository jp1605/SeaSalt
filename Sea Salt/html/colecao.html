<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleção | SeaSalt</title>
    <link rel="stylesheet" href="../css/style3.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="collection-page">

    <nav class="navbar dark">
        <a href="../index.html" class="logo">
            <img src="../assets/frase-logo-rmvbg.png" alt="SeaSalt Logo">
        </a>
        <ul class="nav-links">
            <li><a href="colecao.html">Coleção</a></li>
            <li><a href="../html/carrinho.html">Carrinho</a></li>
            <li><a href="../html/login.html">Conta</a></li>
        </ul>
    </nav>

    <header class="collection-hero">
        <div class="container">
            <span class="eyebrow">Shop All</span>
            <h1>A Nossa Coleção</h1>
            <p>Peças éticas, criadas para durar e desenhadas para elevar a tua confiança.</p>
        </div>
    </header>

    <main class="collection-container">
        <div class="filter-wrapper">
            <div class="filter-controls">
                <button class="filter-btn active" data-filter="all">Todos</button>
                <button class="filter-btn" data-filter="bikini">Biquínis</button>
                <button class="filter-btn" data-filter="swimsuit">Fatos de Banho</button>
                <button class="filter-btn" data-filter="promo">Promoções</button>
            </div>
            <div class="product-count">
                <span id="count-num">6</span> produtos encontrados
            </div>
        </div>

        <div class="products-masonry" id="product-grid">
            
            
</div>
            
    </main>


   <script type="module">
    import { supabase } from '../js/supabase.js';

    async function listarProdutos() {
        // Vai buscar os produtos ativos à base de dados
        const { data: produtos, error } = await supabase.from('produto').select('*').eq('ativo', true);

        if (error) return console.error("Erro do Supabase:", error);

        const grid = document.getElementById('product-grid');
        grid.innerHTML = ''; 

        // Desenha os cartões no HTML
        produtos.forEach(p => {
            grid.innerHTML += `
                <a href="produto.html?id=${p.id_produto}" class="product-item" style="text-decoration:none; color:inherit;">
                    <div class="product-img-box">
                        <img src="${p.imagem_url}" alt="${p.nome}" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div class="product-info">
                        <h3>${p.nome}</h3>
                        <span class="price">${p.preco.toFixed(2)}€</span>
                    </div>
                </a>
            `;
        });
    }

    document.addEventListener('DOMContentLoaded', listarProdutos);
</script>



     <footer id="main-footer">
        <div class="footer-logo">SEASALT<span>~</span></div>
        <p class="copyright">© 2026 SeaSalt Conscious Swimwear. Todos os direitos reservados.</p>
    </footer>


    <script src="js/components.js"></script>

</body>
</html>
