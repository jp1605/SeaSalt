<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SeaSalt Conscious Swimwear</title>
    <link rel="stylesheet" href="../css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-visual">
            <div class="auth-overlay"></div>
            <div class="auth-quote">
                <p>"O mar, uma vez que lança o seu feitiço, prende a pessoa na sua rede de maravilhas para sempre."</p>
                <span>— Jacques Cousteau</span>
            </div>
        </div>

        <div class="auth-form-section">
            <a href="../index.html" class="back-home">← Voltar à Loja</a>
            
            <div class="auth-box">
                <div class="logo">SEASALT<span>~</span></div>
                <h2>Bem-vinda de volta.</h2>
                <p>Inicia sessão para gerir as tuas encomendas e favoritos.</p>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="exemplo@email.com" required>
                    </div>
                    <div class="input-group">
                        <label>Palavra-passe</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="auth-submit">Entrar</button>
                </form>

<script src="js/auth.js"></script>

                <p class="auth-footer">
                    Ainda não tens conta? <a href="../html/registo.html">Criar conta SeaSalt</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
